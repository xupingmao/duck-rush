<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学计算器 | Duck Rush</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        main {
            padding: 20px;
        }

        .input-section {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }

        .input-container {
            position: relative;
        }

        #calculationInput {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s ease;
            resize: vertical;
            min-height: 80px;
        }

        #calculationInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .buttons-section {
            margin-bottom: 20px;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }

        .symbol-btn {
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: #f8f9fa;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .symbol-btn:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .calculate-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .calculate-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .result-section {
            margin-bottom: 20px;
        }

        .result-container {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 16px;
            border-left: 4px solid #667eea;
        }

        .result-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 4px;
        }

        #resultDisplay {
            font-size: 1.4rem;
            font-weight: 700;
            color: #333;
            word-break: break-all;
            line-height: 1.5;
        }

        .history-section {
            margin-bottom: 20px;
        }

        .history-container {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 16px;
        }

        .history-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 12px;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-expression {
            font-size: 0.9rem;
            color: #666;
            flex: 1;
            word-break: break-word;
        }

        .history-result {
            font-size: 0.9rem;
            font-weight: 600;
            color: #333;
            margin-left: 12px;
        }

        .variables-section {
            margin-bottom: 20px;
        }

        .variables-container {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 16px;
        }

        .variables-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 12px;
        }

        .variables-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }

        .variable-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 0.8rem;
        }

        .variable-name {
            font-weight: 600;
            color: #667eea;
        }

        .variable-value {
            color: #666;
            margin-left: 4px;
        }

        footer {
            background: #f8f9fa;
            padding: 12px 20px;
            text-align: center;
            border-top: 1px solid #e9ecef;
        }

        .footer-text {
            color: #666;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .container {
                border-radius: 8px;
            }

            header {
                padding: 16px;
            }

            .header-title {
                font-size: 1.2rem;
            }

            main {
                padding: 16px;
            }

            #calculationInput {
                min-height: 60px;
            }

            .buttons-grid {
                grid-template-columns: repeat(6, 1fr);
            }

            .variables-list {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }

        @media (max-width: 480px) {
            .buttons-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .variables-list {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }

            .history-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .history-result {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="header-title">数学计算器</h1>
            <p class="header-subtitle">输入计算公式，使用 $1-$10 引用历史结果</p>
        </header>

        <main>
            <!-- 输入区域 -->
            <section class="input-section">
                <label for="calculationInput" class="input-label">计算公式</label>
                <div class="input-container">
                    <textarea id="calculationInput" placeholder="输入计算公式，例如：2 + 3 * 4 或 $1 + 5"></textarea>
                </div>
            </section>

            <!-- 预设符号按钮 -->
            <section class="buttons-section">
                <div class="buttons-grid">
                    <button class="symbol-btn" data-symbol="+">+</button>
                    <button class="symbol-btn" data-symbol="-">-</button>
                    <button class="symbol-btn" data-symbol="*">×</button>
                    <button class="symbol-btn" data-symbol="/">÷</button>
                    <button class="symbol-btn" data-symbol="(">(</button>
                    <button class="symbol-btn" data-symbol=")">)</button>
                    <button class="symbol-btn" data-symbol="^">^</button>
                    <button class="symbol-btn" data-symbol="%">%</button>
                    <button class="symbol-btn" data-symbol="pi">π</button>
                    <button class="symbol-btn" data-symbol="e">e</button>
                    <button class="symbol-btn" data-symbol="sqrt(">√</button>
                    <button class="symbol-btn" data-symbol="abs(">|x|</button>
                    <button class="symbol-btn" data-symbol="sin(">sin</button>
                    <button class="symbol-btn" data-symbol="cos(">cos</button>
                    <button class="symbol-btn" data-symbol="tan(">tan</button>
                    <button class="symbol-btn" data-symbol="log(">log</button>
                    <button class="symbol-btn" data-symbol="ln(">ln</button>
                    <button class="symbol-btn" data-symbol="max(">max</button>
                    <button class="symbol-btn" data-symbol="min(">min</button>
                    <button class="symbol-btn" data-symbol="round(">round</button>
                    <button class="symbol-btn" data-symbol="floor(">floor</button>
                    <button class="symbol-btn" data-symbol="ceil(">ceil</button>
                    <button class="symbol-btn" data-symbol="$">$</button>
                </div>
                <button id="calculateBtn" class="calculate-btn">计算</button>
            </section>

            <!-- 结果显示 -->
            <section class="result-section">
                <div class="result-container">
                    <div class="result-label">计算结果</div>
                    <div id="resultDisplay">0</div>
                </div>
            </section>

            <!-- 变量引用 -->
            <section class="variables-section">
                <div class="variables-container">
                    <div class="variables-title">变量引用</div>
                    <div class="variables-list" id="variablesList">
                        <!-- 变量将通过 JavaScript 动态生成 -->
                    </div>
                </div>
            </section>

            <!-- 历史记录 -->
            <section class="history-section">
                <div class="history-container">
                    <div class="history-title">最近计算</div>
                    <ul class="history-list" id="historyList">
                        <!-- 历史记录将通过 JavaScript 动态生成 -->
                    </ul>
                </div>
            </section>
        </main>

        <footer>
            <p class="footer-text">© 2026 Duck Rush 项目 | 数学计算器</p>
        </footer>
    </div>

    <script src="../../lib/decimal-10.6.0.min.js"></script>
    <script src="math-calculator.js"></script>
    </body>
</html>
