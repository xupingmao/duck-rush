<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web工具索引 | Duck Rush</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 20px;
            text-align: center;
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        main {
            padding: 24px 20px;
        }

        .section-title {
            font-size: 1.2rem;
            color: #444;
            margin-bottom: 16px;
            padding-bottom: 6px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .tool-card {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 12px;
            transition: all 0.3s ease;
            border: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tool-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-color: #667eea;
        }

        .tool-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            margin: 0;
        }

        .tool-description {
            font-size: 0.8rem;
            color: #666;
            margin: 0;
            line-height: 1.3;
            flex-grow: 1;
        }

        .tool-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            margin-top: 2px;
            align-self: flex-start;
        }

        .tool-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.4);
        }

        .info-section {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .info-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .info-content {
            font-size: 0.85rem;
            color: #666;
            line-height: 1.4;
        }

        .info-content ul {
            margin-top: 6px;
            padding-left: 18px;
        }

        .info-content li {
            margin-bottom: 4px;
        }

        footer {
            background: #f8f9fa;
            padding: 12px 20px;
            text-align: center;
            border-top: 1px solid #e9ecef;
        }

        .footer-text {
            color: #666;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 8px;
            }

            .container {
                border-radius: 8px;
            }

            header {
                padding: 24px 16px;
            }

            .header-title {
                font-size: 1.6rem;
            }

            main {
                padding: 24px 16px;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }

            .tool-card {
                padding: 16px;
            }

            .info-section {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="header-title">Web工具索引</h1>
            <p class="header-subtitle">Duck Rush 项目的 Web 工具集合</p>
        </header>

        <main>
            <section>
                <h2 class="section-title">🔧 可用工具</h2>
                
                <!-- 搜索框 -->
                <div style="margin-bottom: 20px;">
                    <input 
                        type="text" 
                        id="searchBox" 
                        placeholder="搜索工具..." 
                        style="
                            width: 100%;
                            padding: 10px 14px;
                            border: 1px solid #ddd;
                            border-radius: 6px;
                            font-size: 0.9rem;
                            transition: border-color 0.3s ease;
                        "
                    >
                    <style>
                        #searchBox:focus {
                            outline: none;
                            border-color: #667eea;
                            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
                        }
                    </style>
                </div>
                
                <div class="tools-grid" id="toolsGrid">
                    <!-- 工具卡片将通过 JavaScript 动态生成 -->
                </div>
            </section>

            <section class="info-section">
                <h3 class="info-title">📖 使用说明</h3>
                <div class="info-content">
                    <p>本页面是 Duck Rush 项目中 Web 工具的索引中心，包含了以下功能：</p>
                    <ul>
                        <li>快速访问项目中的所有 Web 工具</li>
                        <li>查看每个工具的简要描述</li>
                        <li>通过美观的界面轻松导航</li>
                    </ul>
                    <p>点击上方的工具卡片即可打开对应工具。</p>
                </div>
            </section>
        </main>

        <footer>
            <p class="footer-text">© 2026 Duck Rush 项目 | Web 工具索引</p>
        </footer>
    </div>

    <!-- 先加载配置文件，再加载脚本 -->
    <script src="../js/index.config.js"></script>
    <script>
        // 动态生成工具卡片
        function generateToolCards(tools = null) {
            const toolsGrid = document.getElementById('toolsGrid');
            toolsGrid.innerHTML = '';
            
            // 如果没有传入筛选后的工具，则使用所有工具
            if (!tools) {
                tools = [];
                menuConfig.forEach(category => {
                    if (category.tabs && category.tabs.length > 0) {
                        category.tabs.forEach(tool => {
                            tools.push({ ...tool, category });
                        });
                    } else if (category.url) {
                        tools.push({ ...category, category });
                    }
                });
            }
            
            // 遍历工具列表，生成卡片
            tools.forEach(item => {
                const tool = item;
                const category = item.category;
                
                const toolCard = document.createElement('div');
                toolCard.className = 'tool-card';
                
                toolCard.innerHTML = `
                    <h3 class="tool-title">${category.icon || ''} ${tool.name}</h3>
                    <p class="tool-description">${tool.description || ''}</p>
                    <a href="${tool.url.replace(/^pages\//, '')}" class="tool-link">打开工具</a>
                `;
                
                toolsGrid.appendChild(toolCard);
            });
        }
        
        // 搜索功能
        function addSearchFunctionality() {
            const searchBox = document.getElementById('searchBox');
            
            searchBox.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase().trim();
                
                if (!searchTerm) {
                    // 清空搜索时，显示所有工具
                    generateToolCards();
                    return;
                }
                
                // 筛选工具
                const filteredTools = [];
                menuConfig.forEach(category => {
                    if (category.tabs && category.tabs.length > 0) {
                        category.tabs.forEach(tool => {
                            const toolId = (tool.id || '').toLowerCase();
                            const toolName = (tool.name || '').toLowerCase();
                            const toolUrl = (tool.url || '').toLowerCase();
                            const toolDescription = (tool.description || '').toLowerCase();
                            const categoryName = (category.name || '').toLowerCase();

                            // 搜索工具id、名称、URL、描述和分类名称
                            if (
                                toolId.includes(searchTerm) ||
                                toolName.includes(searchTerm) ||
                                toolUrl.includes(searchTerm) ||
                                toolDescription.includes(searchTerm) ||
                                categoryName.includes(searchTerm)
                            ) {
                                filteredTools.push({ ...tool, category });
                            }
                        });
                    } else if (category.url) {
                        const catId = (category.id || '').toLowerCase();
                        const catName = (category.name || '').toLowerCase();
                        const catUrl = (category.url || '').toLowerCase();
                        const catDescription = (category.description || '').toLowerCase();

                        if (
                            catId.includes(searchTerm) ||
                            catName.includes(searchTerm) ||
                            catUrl.includes(searchTerm) ||
                            catDescription.includes(searchTerm)
                        ) {
                            filteredTools.push({ ...category, category });
                        }
                    }
                });
                
                // 生成筛选后的工具卡片
                generateToolCards(filteredTools);
            });
        }
        
        // 页面加载完成后生成工具卡片和添加搜索功能
        window.addEventListener('DOMContentLoaded', function() {
            generateToolCards();
            addSearchFunctionality();
        });
    </script>
</body>
</html>
